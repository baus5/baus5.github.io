<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My First Website | Welcome to the matrix...</title>

    <!-- (!!!) Add Core Open Graph Meta Tags -->
    <meta name="description" content="" />
    <meta name="author" content="John Doe" />
    <meta name="keywords" content="HTML, CSS, JavaScript" />

    <!-- (!!!) Add Google Fonts -->
    <link rel="stylesheet" href="style.css" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/nerd-face-favicon-32x32.png"
    />

    <style>
      body {
        margin: 0;
        display: flex;
        justify-content: center;
      }

      .main-container {
        width: 100%;
        max-width: 800px;
        padding: 1rem;
      }

      main {
        font-family: Georgia, "Times New Roman", Times, serif;
        background-color: aqua;
        color: blue;

        padding-top: 50px;
        padding-bottom: 100px;
        padding-left: 20px;
      }

      nav ul {
        margin: 0;
        padding: 0;
        text-align: right;
      }

      nav > ul > li {
        list-style: none;
        display: inline;

        color: darkblue;

        text-transform: lowercase;
        font-size: large;
        font-family: "Courier New", Courier, monospace;
        text-decoration: line-through;
      }

      nav > ul > li:hover {
        text-decoration: none;
        cursor: pointer;
      }

      nav > ul > li:active {
        text-decoration: none;
        cursor: progress;
      }

      /* (!!!) Fix its position later */
      footer {
        margin-top: 80%;
      }

      footer p {
        text-align: center;
        font-style: italic;
      }
    </style>
  </head>

  <body>
    <div class="main-container">
      <header></header>
      <nav>
        <ul>
          <li>About</li>
          <li>Blog</li>
          <li>Code</li>
          <li>Design</li>
          <li>Fun</li>
        </ul>
      </nav>

      <main>
        <section>
          <h1>Hello, world 👋</h1>
          <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit.</p>
        </section>
      </main>

      <div class="temporary-container" style="text-decoration: line-through">
        <p>
          <a href="./old-website/index.html" style="text-decoration: none"
            >Go to Old version</a
          >
        </p>
      </div>

      <footer>
        <p>This is a footer</p>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
